name: CI
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1

      - name: Test
        run: sbt --client ci

      - name: Test publishing (Cross-Build)
        run: sbt --client +publishLocal

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          gpg_private_key: ${{ secrets.PGP_SECRET }}
          passphrase: ${{ secrets.PGP_PASSPHRASE }}

      - name: Publish locally and sign ${{ github.ref }}
        if: startsWith(github.ref, 'refs/tags/v')
        run: sbt +publishSigned

      - name: Upload to Maven Central Portal
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          echo "Package all artifacts..."
          cd target/deploy
          zip -r ../bundle.zip .
          cd ../..
          
          echo "Upload to Maven Central..."
          curl --request POST --fail --show-error \
            --header "Authorization: Bearer $(echo -n "${SONATYPE_USERNAME}:${SONATYPE_PASSWORD}" | base64 -w 0)" \
            --form bundle=@target/bundle.zip \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC"

  mergify-build-checkpoint:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: I only exist to please Mergify :(
        run: echo "It's a sad existence but necessary"